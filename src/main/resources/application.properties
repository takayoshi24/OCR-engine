spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.port=8080

# OCR pipeline — limits concurrent jobs and hard-cancels hung requests
ocr.pipeline.thread-pool-size=4
ocr.pipeline.timeout-seconds=300

# Activate the dev profile by default; override with -Dspring.profiles.active=prod
# or SPRING_PROFILES_ACTIVE=prod for production deployments.
spring.profiles.active=dev
