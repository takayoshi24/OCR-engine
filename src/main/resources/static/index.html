<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Redactor</title>
    <link rel="stylesheet" href="/tailwind.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50 flex items-center justify-center p-6">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">

    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">PDF Redactor</h1>
        <p class="text-sm text-gray-500 mt-1">Upload a PDF, enter words to black out, download the result.</p>
    </div>

    <!-- Drop zone -->
    <div id="drop-zone"
         class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer
                hover:border-blue-400 hover:bg-blue-50 transition-colors mb-5">
        <svg class="mx-auto mb-3 text-gray-400 w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
        </svg>
        <p class="text-sm text-gray-600">
            Drag &amp; drop a PDF here, or
            <span class="text-blue-500 font-medium">browse</span>
        </p>
        <p id="file-name" class="text-xs text-gray-400 mt-2">No file selected</p>
        <input id="file-input" type="file" accept="application/pdf" class="hidden">
    </div>

    <!-- Words -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Words to redact</label>
        <input id="words" type="text" placeholder="e.g. John, confidential, secret"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent">
        <p class="text-xs text-gray-400 mt-1">Comma-separated. Leave empty to process without redactions.</p>
    </div>

    <!-- Match mode -->
    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Match mode</label>
        <select id="mode"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                       focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent bg-white">
            <option value="CASE_INSENSITIVE">Case insensitive</option>
            <option value="EXACT">Exact</option>
            <option value="REGEX">Regex</option>
        </select>
    </div>

    <!-- Submit -->
    <button id="submit-btn"
            class="w-full bg-blue-500 hover:bg-blue-600 disabled:opacity-40 disabled:cursor-not-allowed
                   text-white font-semibold rounded-lg py-2.5 transition-colors">
        Process PDF
    </button>

    <!-- Loading -->
    <div id="loading" class="hidden mt-5 flex items-center justify-center gap-3 text-sm text-gray-500">
        <svg class="animate-spin h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        Processing, please wait…
    </div>

    <!-- Success -->
    <div id="result" class="hidden mt-5 p-4 bg-green-50 border border-green-200 rounded-xl flex items-center gap-3">
        <svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
        <div class="flex-1">
            <p class="text-sm text-green-800 font-medium">Done!</p>
            <a id="download-link" href="#" download
               class="text-sm text-green-700 underline font-medium">Download redacted PDF</a>
        </div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden mt-5 p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3">
        <svg class="w-5 h-5 text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
        </svg>
        <p id="error-msg" class="text-sm text-red-700"></p>
    </div>

</div>

<script>
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const fileName   = document.getElementById('file-name');
    const submitBtn  = document.getElementById('submit-btn');
    const loading    = document.getElementById('loading');
    const result     = document.getElementById('result');
    const downloadLink = document.getElementById('download-link');
    const errorBox   = document.getElementById('error');
    const errorMsg   = document.getElementById('error-msg');

    let selectedFile = null;

    // Click opens file picker
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    // Drag & drop
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('border-blue-400', 'bg-blue-50');
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
    });
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        const f = e.dataTransfer.files[0];
        if (f && f.type === 'application/pdf') setFile(f);
        else showError('Please drop a PDF file.');
    });

    function setFile(f) {
        selectedFile = f;
        fileName.textContent = f.name;
        hide(result);
        hide(errorBox);
    }

    submitBtn.addEventListener('click', async () => {
        if (!selectedFile) { showError('Please select a PDF file first.'); return; }

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('words', document.getElementById('words').value);
        formData.append('mode', document.getElementById('mode').value);

        hide(result);
        hide(errorBox);
        show(loading);
        submitBtn.disabled = true;

        try {
            const response = await fetch('/api/process', { method: 'POST', body: formData });

            if (!response.ok) {
                const msg = await response.text();
                throw new Error(msg || `Server error: ${response.status}`);
            }

            const blob = await response.blob();
            const url  = URL.createObjectURL(blob);
            const disposition = response.headers.get('Content-Disposition') || '';
            const match = disposition.match(/filename="?([^"]+)"?/);
            const name  = match ? match[1] : 'redacted.pdf';

            downloadLink.href     = url;
            downloadLink.download = name;
            show(result);

        } catch (err) {
            showError(err.message);
        } finally {
            hide(loading);
            submitBtn.disabled = false;
        }
    });

    function show(el) { el.classList.remove('hidden'); }
    function hide(el) { el.classList.add('hidden'); }
    function showError(msg) { errorMsg.textContent = msg; show(errorBox); }
</script>

</body>
</html>
